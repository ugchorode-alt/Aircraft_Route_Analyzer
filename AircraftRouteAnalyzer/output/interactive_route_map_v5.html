var AIRLINE_COLORS = {"IndiGo": "#1a3fff", "Air India": "#e31837", "Akasa Air": "#ff6b00", "SpiceJet": "#cc0000", "All": "#1a73e8"};

var mapObj = null;

var drawnLayers = [];

window.addEventListener("load", function() {

    mapObj = map_f1915cbdb449c3c943ba1447f5a8b146;

});


function clearLayers() {

    drawnLayers.forEach(function(layer){
        mapObj.removeLayer(layer);
    });

    drawnLayers = [];

}



function findRoute() {

    var airline =
        document.getElementById("airline-select").value;

    var origin =
        document.getElementById("origin-select").value;

    var destination =
        document.getElementById("destination-select").value;

    var resultBox =
        document.getElementById("result-box");


    if(origin === destination){

        resultBox.innerHTML =
        "<span style='color:red'>⚠ Select two different airports.</span>";

        return;
    }


    var data = ALL_AIRLINE_PATHS[airline][origin + "-" + destination];

    if(!data){

        resultBox.innerHTML =
        "<span style='color:red'>No route found.</span>";

        return;
    }


    clearLayers();


    var color = AIRLINE_COLORS[airline] || "#1a73e8";


    // Draw route segments
    for(var i=0;i<data.coords.length-1;i++){

        var leg = L.polyline(

            [

                data.coords[i],

                data.coords[i+1]

            ],

            {

                color:color,

                weight:5,

                opacity:.9

            }

        );

        leg.addTo(mapObj);

        drawnLayers.push(leg);

    }



    // Draw airport circles
    data.coords.forEach(function(coord,index){

        var fillColor;

        if(index===0)
            fillColor="#2dc653";

        else if(index===data.coords.length-1)
            fillColor="#e63946";

        else
            fillColor="#ff9f1c";


        var marker = L.circleMarker(

            coord,

            {

                radius:9,

                color:"white",

                weight:2,

                fillColor:fillColor,

                fillOpacity:1

            }

        );

        marker.addTo(mapObj);

        drawnLayers.push(marker);

    });



    mapObj.fitBounds(

        L.polyline(data.coords).getBounds(),

        {

            padding:[60,60]

        }

    );



    // Stops badge
    var stopText;

    if(data.stops===0)
    {

        stopText =
        "<span style='background:#2dc653;color:white;padding:3px 10px;border-radius:12px;'>Direct</span>";

    }

    else
    {

        stopText =

        data.path.slice(1,-1).map(

            x =>

            "<span style='background:#ff9f1c;color:white;padding:3px 8px;border-radius:12px;margin-right:4px;'>"

            + x +

            "</span>"

        ).join("");

    }



    // Leg Table
    var legTable = "";

    for(var j=0;j<data.path.length-1;j++){

        legTable +=

        "<tr>" +

        "<td>" + (j+1) + "</td>" +

        "<td>" +
        data.path[j]
        + " → " +
        data.path[j+1]
        + "</td>" +

        "<td>" +
        data.leg_distances[j]
        + " km</td>" +

        "<td>" +
        data.leg_aircraft[j]
        + "</td>" +

        "</tr>";

    }



    resultBox.innerHTML =

    "<h3 style='color:#1a73e8;margin-top:0;'>Route Details</h3>"

    +

    "<b>Airline:</b> " + airline +

    "<br><br>"

    +

    "<b>Origin:</b> "

    + data.path[0]

    +

    "<br>"

    +

    "<b>Destination:</b> "

    + data.path[data.path.length-1]

    +

    "<br><br>"

    +

    "<b>Distance:</b> "

    + data.distance_km

    +

    " km"

    +

    "<br>"

    +

    "<b>Estimated Time:</b> "

    + data.time_str

    +

    "<br>"

    +

    "<b>Aircraft:</b> "

    + data.aircraft

    +

    "<br>"

    +

    "<b>Fuel Required:</b> "

    + data.fuel_litres

    +

    " L"

    +

    "<br>"

    +

    "<b>CO₂ Produced:</b> "

    + data.co2_kg

    +

    " kg"

    +

    "<br>"

    +

    "<b>CO₂ / Passenger:</b> "

    + data.co2_per_pax

    +

    " kg"

    +

    "<br>"

    +

    "<b>Fuel Cost:</b> ₹"

    +

    data.fuel_cost_inr.toLocaleString("en-IN")

    +

    "<br><br>"

    +

    "<b>Stops:</b><br>"

    +

    stopText

    +

    "<br><br>"

    +

    "<b>Leg-by-Leg Breakdown</b>"

    +

    "<table style='width:100%;margin-top:8px;border-collapse:collapse;font-size:12px;'>"

    +

    "<tr style='background:#edf2f7;'>"

    +

    "<th>#</th>"

    +

    "<th>Route</th>"

    +

    "<th>Distance</th>"

    +

    "<th>Aircraft</th>"

    +

    "</tr>"

    +

    legTable

    +

    "</table>";

}

</script>
